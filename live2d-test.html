<script>
  const app = new PIXI.Application({
    resizeTo: window,
    backgroundAlpha: 0
  });

  document.getElementById("stage").appendChild(app.view);

  const modelPath = "assets/live2d/仟云桥.model3.json";

  PIXI.live2d.Live2DModel.from(modelPath)
    .then(model => {
      app.stage.addChild(model);

      model.scale.set(0.28);
      model.x = window.innerWidth * 0.8;
      model.y = window.innerHeight * 0.95;
      model.anchor.set(0.5, 1);

      // Reduce automatic tracking feel
      let targetX = 0;
      let targetY = 0;
      let currentX = 0;
      let currentY = 0;

      window.addEventListener("mousemove", (e) => {
        const nx = (e.clientX / window.innerWidth) * 2 - 1;
        const ny = (e.clientY / window.innerHeight) * 2 - 1;

        // shrink the influence so she doesn't turn too much
        targetX = nx * 0.35;
        targetY = ny * 0.25;
      });

      app.ticker.add(() => {
        // smoothing
        currentX += (targetX - currentX) * 0.06;
        currentY += (targetY - currentY) * 0.06;

        if (model.internalModel && model.internalModel.focusController) {
          model.internalModel.focusController.focus(currentX, currentY, false);
        }
      });

      window.addEventListener("resize", () => {
        model.x = window.innerWidth * 0.8;
        model.y = window.innerHeight * 0.95;
      });
    })
    .catch(err => {
      console.error("Failed to load Live2D model:", err);
    });
</script>
